services:
  - type: web
    name: hidrosys-system
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node db/setup.js && npm start
    envVars:
      - key: PORT
        value: 3000
      - key: DB_HOST
        fromDatabase:
          name: hidrosys-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: hidrosys-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: hidrosys-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: hidrosys-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: hidrosys-db
          property: password

databases:
  - name: hidrosys-db
    plan: free
